{% extends "base.html" %}

{% block main %}
<section class="properties-page">
  <h1 class="page-title">Properties</h1>

  <div class="properties-grid">
    {% for property in properties %}
      <article class="property-card">
        <img
          src="{{ url_for('static', filename='uploads/' ~ property.photo) }}"
          alt="{{ property.title }}"
          class="property-card-image"
        >
        <div class="property-card-content">
          <h2>{{ property.title }}</h2>
          <p class="property-location">{{ property.location }}</p>
          <p class="property-price">${{ "{:,}".format(property.price) }}</p>
        </div>
        <a class="btn btn-primary w-100 property-link" href="{{ url_for('property_details', propertyid=property.id) }}">
          View Property
        </a>
      </article>
    {% else %}
      <p>No properties available yet.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
